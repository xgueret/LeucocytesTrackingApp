services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leucocytes-backend
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=production
      - PORT=8081
      - DATABASE_URL=/app/data/leucocytes.db
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      # Secrets obligatoires : définis dans un fichier .env à la racine (voir .env.example)
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - ADMIN_USERNAME=${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - ADMIN_PIN=${ADMIN_PIN:-}
    volumes:
      - backend-data:/app/data
    networks:
      - leucocytes-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leucocytes-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - leucocytes-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  backend-data:
    driver: local

networks:
  leucocytes-network:
    driver: bridge